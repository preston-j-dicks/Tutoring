<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Portal — FissionLab</title>
<meta name="robots" content="noindex, nofollow">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a1628;
    color: #f0ebe0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 20px;
  }
  .icon { font-size: 3.5rem; margin-bottom: 20px; }
  h1 { font-size: 1.8rem; font-weight: 700; color: #fff; margin-bottom: 10px; }
  h1 span { color: #c9a84c; }
  p {
    font-size: 1rem;
    color: rgba(240,235,224,0.6);
    max-width: 400px;
    line-height: 1.65;
    margin-bottom: 32px;
  }
  .btn {
    display: inline-block;
    background: #c9a84c;
    color: #0a1628;
    font-weight: 700;
    font-size: 0.95rem;
    padding: 13px 28px;
    border-radius: 8px;
    text-decoration: none;
    transition: opacity 0.15s;
    margin: 0 6px 12px;
  }
  .btn:hover { opacity: 0.85; }
  .btn-outline {
    background: transparent;
    border: 1px solid rgba(240,235,224,0.2);
    color: rgba(240,235,224,0.65);
  }
  .back { margin-top: 32px; font-size: 0.82rem; color: rgba(240,235,224,0.3); }
  .back a { color: rgba(201,168,76,0.7); text-decoration: none; }
  .back a:hover { color: #c9a84c; }
</style>
</head>
<body>
  <div class="icon">🔒</div>
  <h1>Fission<span>Lab</span> Student Portal</h1>
  <p>This portal is private. If you're a current student, use the personal link Dr. Preston sent you — no login needed.</p>
  <div>
    <a href="mailto:preston@fissionlab.net" class="btn btn-outline">Contact Dr. Preston</a>
  </div>
  <p class="back"><a href="/">← Back to FissionLab</a></p>
</body>
</html>
